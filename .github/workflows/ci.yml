name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...
      - name: go build
        run: go build ./...
